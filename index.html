<!doctype html>
<html lang="en">
  <head>
    <script>
      try {
        document.documentElement.setAttribute('data-theme', 'light');
        const s = localStorage.getItem('app_settings');
        if (s) {
          const parsed = JSON.parse(s);
          if (parsed.colorTheme) {
            document.documentElement.setAttribute('data-color-theme', parsed.colorTheme);
          } else {
            document.documentElement.setAttribute('data-color-theme', 'green');
          }
        } else {
          document.documentElement.setAttribute('data-color-theme', 'green');
        }
      } catch (e) {
        document.documentElement.setAttribute('data-color-theme', 'green');
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="transparent">
    <meta name="theme-color" content="#00000000" media="(prefers-color-scheme: dark)">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OVERCAST">
    <meta name="application-name" content="OVERCAST">
    <link rel="manifest" href="/manifest.json">
    <title>OVERCAST</title>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg))
            .catch(err => console.warn('SW failed:', err));
        });
      }
    </script>
  </head>
  <body>

    <!-- Pre-warm backdrop-filter GPU pipeline to prevent transparent visual flashes on load -->
    <div id="blur-prewarm" style="
      position: fixed;
      top: -9999px;
      left: -9999px;
      width: 1px;
      height: 1px;
      backdrop-filter: blur(1px);
      -webkit-backdrop-filter: blur(1px);
      transform: translateZ(0);
      pointer-events: none;
      opacity: 0;
    " aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
