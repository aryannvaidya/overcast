<!doctype html>
<html lang="en">
  <head>
    <script>
      try {
        document.documentElement.setAttribute('data-theme', 'light');
        const s = localStorage.getItem('app_settings');
        if (s) {
          const parsed = JSON.parse(s);
          if (parsed.colorTheme) {
            document.documentElement.setAttribute('data-color-theme', parsed.colorTheme);
          } else {
            document.documentElement.setAttribute('data-color-theme', 'green');
          }
        } else {
          document.documentElement.setAttribute('data-color-theme', 'green');
        }
      } catch (e) {
        document.documentElement.setAttribute('data-color-theme', 'green');
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="transparent">
    <meta name="theme-color" content="#00000000" media="(prefers-color-scheme: dark)">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OVERCAST">
    <meta name="application-name" content="OVERCAST">
    <link rel="manifest" href="/manifest.json">
    <title>OVERCAST</title>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg))
            .catch(err => console.warn('SW failed:', err));
        });
      }
    </script>
  </head>
  <body>
    <!-- Beautiful Inline Loading Screen (Instant Paint) -->
    <div id="app-loading-screen" style="
      position: fixed;
      inset: 0;
      background-color: #0F1219;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999999;
      opacity: 1;
      transition: opacity 0.25s ease-out;
    ">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 24px;">
        <!-- Beautiful minimalist cloud SVG matching Overcast's branding -->
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="opacity: 0.85;">
          <path d="M19.36 10.04C18.67 6.59 15.64 4 12 4C9.11 4 6.6 5.64 5.35 8.04C2.34 8.36 0 10.91 0 14C0 17.31 2.69 20 6 20H19C21.76 20 24 17.76 24 15C24 12.36 21.95 10.22 19.36 10.04Z" fill="white" fill-opacity="0.9"/>
        </svg>
        <!-- Sophisticated high-end spinner -->
        <div class="inline-loader-spin" style="
          width: 32px;
          height: 32px;
          border: 3px solid rgba(255, 255, 255, 0.1);
          border-top: 3px solid #ffffff;
          border-radius: 50%;
          animation: webview-loading-spin 0.8s linear infinite;
        "></div>
      </div>
      <style>
        @keyframes webview-loading-spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
    </div>

    <!-- Pre-warm backdrop-filter GPU pipeline to prevent transparent visual flashes on load -->
    <div id="blur-prewarm" style="
      position: fixed;
      top: -9999px;
      left: -9999px;
      width: 1px;
      height: 1px;
      backdrop-filter: blur(1px);
      -webkit-backdrop-filter: blur(1px);
      transform: translateZ(0);
      pointer-events: none;
      opacity: 0;
    " aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
